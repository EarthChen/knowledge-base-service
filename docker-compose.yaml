services:
  kb-service:
    build: .
    ports:
      - "${PORT:-8100}:${PORT:-8100}"
    env_file:
      - .env
    volumes:
      - embedding_cache:/home/kbuser/.cache
    depends_on:
      falkordb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8100}/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G

  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "${FALKORDB_PORT:-6379}:6379"
    volumes:
      - falkordb_data:/data
    environment:
      - FALKORDB_ARGS=TIMEOUT 0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  falkordb_data:
  embedding_cache:
